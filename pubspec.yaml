name: insins
description: "Incense SA - Flutter E-Commerce App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  font_awesome_flutter: ^10.12.0
  flutter_animate: ^4.5.2

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  # Network
  dio: ^5.9.2
  get_it: ^9.2.1

  # Storage
  shared_preferences: ^2.2.0

  # Functional Programming (بدل either القديمة)

  # Navigation
  go_router: ^17.1.0
  dartz: ^0.10.1
  # Image
  cached_network_image: ^3.4.1
  pretty_dio_logger: ^1.4.0

  # Localization
  easy_localization: ^3.0.2
  url_launcher: ^6.3.0
  shimmer: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  webview_flutter: ^4.13.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/insins.jpg"